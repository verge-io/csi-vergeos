apiVersion: apps/v1
kind: Deployment
metadata:
  name: csi-vergeos-nas-controller
  namespace: kube-system
  labels:
    app: csi-vergeos-nas-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csi-vergeos-nas-controller
  template:
    metadata:
      labels:
        app: csi-vergeos-nas-controller
    spec:
      serviceAccountName: csi-vergeos
      containers:
        # CSI driver - NAS controller mode
        - name: csi-vergeos
          image: vergeio/csi-vergeos:latest
          args:
            - "--driver=nas"
            - "--mode=controller"
            - "--endpoint=unix:///csi/csi.sock"
            - "--v=5"
          envFrom:
            - secretRef:
                name: vergeos-credentials
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        # CSI provisioner sidecar
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.1.0
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=5"
            - "--leader-election"
            - "--leader-election-namespace=kube-system"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        # Liveness probe sidecar
        - name: liveness-probe
          image: registry.k8s.io/sig-storage/livenessprobe:v2.14.0
          args:
            - "--csi-address=/csi/csi.sock"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi

      volumes:
        - name: socket-dir
          emptyDir: {}
