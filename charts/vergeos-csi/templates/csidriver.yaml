{{- if .Values.nas.enabled }}
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi-nas.verge.io
spec:
  attachRequired: false
  podInfoOnMount: false
  volumeLifecycleModes:
    - Persistent
{{- end }}
{{- if .Values.block.enabled }}
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi-block.verge.io
spec:
  attachRequired: true
  podInfoOnMount: false
  volumeLifecycleModes:
    - Persistent
{{- end }}
