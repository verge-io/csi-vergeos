{{- if .Values.block.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vergeos-csi.name" . }}-block-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "vergeos-csi.name" . }}-block-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "vergeos-csi.name" . }}-block-controller
  template:
    metadata:
      labels:
        app: {{ include "vergeos-csi.name" . }}-block-controller
    spec:
      serviceAccountName: {{ include "vergeos-csi.name" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-vergeos
          image: {{ include "vergeos-csi.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--driver=block"
            - "--mode=controller"
            - "--endpoint=unix:///csi/csi.sock"
            - "--pool-vm-id={{ .Values.block.poolVmId }}"
            - "--v={{ .Values.logLevel }}"
          envFrom:
            - secretRef:
                name: {{ include "vergeos-csi.secretName" . }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}

        - name: csi-provisioner
          image: {{ .Values.sidecars.provisioner.image }}
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v={{ .Values.logLevel }}"
            - "--leader-election"
            - "--leader-election-namespace={{ .Release.Namespace }}"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        - name: csi-attacher
          image: {{ .Values.sidecars.attacher.image }}
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v={{ .Values.logLevel }}"
            - "--leader-election"
            - "--leader-election-namespace={{ .Release.Namespace }}"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        - name: liveness-probe
          image: {{ .Values.sidecars.liveness.image }}
          args:
            - "--csi-address=/csi/csi.sock"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi

      volumes:
        - name: socket-dir
          emptyDir: {}
{{- end }}
